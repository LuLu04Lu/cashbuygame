<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下單頁面</title>
  <style>
    :root{--bg:#17171e;--panel:#3a3742;--panel2:#2f2d37;--text:#f1e6d3;--muted:#d5c6ae;--gold:#e7c04a;--gold2:#f0cf63;--line:rgba(255,255,255,.05);--shadow:0 10px 24px rgba(0,0,0,.28)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#1b1b22,#121216);color:var(--text)}
    .top{padding:18px 18px 12px;text-align:center;font-size:20px;font-weight:800;color:#fff}
    .wrap{width:min(430px,92vw);margin:0 auto;padding:8px 0 28px}
    .card{background:var(--panel);border-radius:26px;padding:20px 18px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:16px}
    h2{margin:0 0 14px;font-size:24px;color:#fff}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .choice-input{position:absolute;opacity:0;pointer-events:none}
    .choice{display:flex;align-items:center;justify-content:center;min-height:58px;padding:14px 10px;border-radius:18px;background:var(--panel2);border:1px solid rgba(255,255,255,.06);text-align:center;cursor:pointer;font-weight:700;color:var(--text);user-select:none}
    .choice-input:checked + .choice{background:linear-gradient(180deg,#4a4551,#34313a);border-color:rgba(231,192,74,.55);box-shadow:0 0 0 2px rgba(231,192,74,.12) inset}
    label{display:block;font-size:14px;margin:14px 0 8px;color:#fff;font-weight:700}
    select,input{width:100%;padding:14px;border:none;outline:none;border-radius:16px;background:#f5f0e8;color:#2b2b2b;font-size:15px}
    .submit{width:100%;padding:16px;border:none;border-radius:999px;font-size:18px;font-weight:900;cursor:pointer;box-shadow:var(--shadow);color:#463300;background:linear-gradient(90deg,#d6c7a2,var(--gold2))}
    .tips{margin-top:10px;font-size:12px;line-height:1.6;color:var(--muted)}
    .selected-note{margin-top:10px;font-size:13px;color:#fff}
    a.back{color:#fff;text-decoration:none;margin-left:6px}
  </style>
</head>
<body>
  <div class="top">下單頁面</div>
  <main class="wrap">
    <a class="back" href="index.html">← 返回首頁</a>

    <div class="card">
      <h2>選擇點數卡樣式</h2>
      <div class="grid">
        <div><input class="choice-input" type="radio" name="cardType" id="card1" value="Steam"><label class="choice" for="card1">Steam</label></div>
        <div><input class="choice-input" type="radio" name="cardType" id="card2" value="Google Play"><label class="choice" for="card2">Google Play</label></div>
        <div><input class="choice-input" type="radio" name="cardType" id="card3" value="iOS"><label class="choice" for="card3">iOS</label></div>
        <div><input class="choice-input" type="radio" name="cardType" id="card4" value="Garena"><label class="choice" for="card4">Garena</label></div>
        <div><input class="choice-input" type="radio" name="cardType" id="card5" value="MyCard"><label class="choice" for="card5">MyCard</label></div>
        <div><input class="choice-input" type="radio" name="cardType" id="card6" value="其他點數卡"><label class="choice" for="card6">其他點數卡</label></div>
      </div>
      <div class="selected-note" id="cardSelected">尚未選擇點數卡</div>
    </div>

    <div class="card">
      <h2>選擇金額</h2>
      <div class="grid">
        <div><input class="choice-input" type="radio" name="amount" id="amt1" value="1000"><label class="choice" for="amt1">1000</label></div>
        <div><input class="choice-input" type="radio" name="amount" id="amt2" value="2000"><label class="choice" for="amt2">2000</label></div>
        <div><input class="choice-input" type="radio" name="amount" id="amt3" value="3000"><label class="choice" for="amt3">3000</label></div>
        <div><input class="choice-input" type="radio" name="amount" id="amt4" value="5000"><label class="choice" for="amt4">5000</label></div>
        <div><input class="choice-input" type="radio" name="amount" id="amt5" value="10000"><label class="choice" for="amt5">10000</label></div>
        <div><input class="choice-input" type="radio" name="amount" id="amt6" value="30000"><label class="choice" for="amt6">30000</label></div>
      </div>

      <label for="customAmount">自訂金額</label>
      <input id="customAmount" type="number" inputmode="numeric" placeholder="未選固定金額時，可自行輸入金額">

      <div class="selected-note" id="amountSelected">尚未選擇金額</div>

      <label for="contactType">聯絡方式</label>
      <select id="contactType">
        <option value="">請選擇聯絡方式</option>
        <option value="LINE">LINE</option>
        <option value="Instagram">Instagram</option>
        <option value="電話">電話</option>
      </select>

      <label for="contactName">聯絡名稱</label>
      <input id="contactName" placeholder="請輸入聯絡名稱">

      <label for="contactValue">聯絡資訊</label>
      <input id="contactValue" placeholder="請輸入 LINE / IG / 電話">

      <button class="submit" type="button" onclick="submitOrder()">確認下單</button>
      <div class="tips">成功下單後會跳轉到匯款資訊頁面。</div>
    </div>
  </main>

  <script>
    function getSelectedValue(name){
      const checked = document.querySelector('input[name="' + name + '"]:checked');
      return checked ? checked.value : "";
    }

    function updateSelectedNotes(){
      const card = getSelectedValue("cardType");
      const presetAmount = getSelectedValue("amount");
      const customAmount = document.getElementById("customAmount").value.trim();

      document.getElementById("cardSelected").textContent = card ? "已選擇點數卡：" + card : "尚未選擇點數卡";

      if (presetAmount) {
        document.getElementById("amountSelected").textContent = "已選擇金額：" + presetAmount;
      } else if (customAmount) {
        document.getElementById("amountSelected").textContent = "已輸入自訂金額：" + customAmount;
      } else {
        document.getElementById("amountSelected").textContent = "尚未選擇金額";
      }
    }

    document.querySelectorAll('input[name="cardType"], input[name="amount"]').forEach(function(el){
      el.addEventListener("change", function(){
        if (el.name === "amount") {
          document.getElementById("customAmount").value = "";
        }
        updateSelectedNotes();
      });
    });

    document.getElementById("customAmount").addEventListener("input", function(){
      if (document.getElementById("customAmount").value.trim()) {
        document.querySelectorAll('input[name="amount"]').forEach(function(el){ el.checked = false; });
      }
      updateSelectedNotes();
    });

    function submitOrder(){
      const selectedCard = getSelectedValue("cardType");
      const presetAmount = getSelectedValue("amount");
      const customAmount = document.getElementById("customAmount").value.trim();
      const selectedAmount = presetAmount || customAmount;
      const contactType = document.getElementById("contactType").value.trim();
      const contactName = document.getElementById("contactName").value.trim();
      const contactValue = document.getElementById("contactValue").value.trim();

      if(!selectedCard || !selectedAmount || !contactType || !contactName || !contactValue){
        alert("請先填寫完整資料");
        return;
      }

      const params = new URLSearchParams({
        cardType: selectedCard,
        amount: selectedAmount,
        contactType,
        contactName,
        contactValue
      });

      window.location.href = "payment.html?" + params.toString();
    }

    updateSelectedNotes();
  </script>
</body>
</html>
